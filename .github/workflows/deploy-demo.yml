name: Deploy demo

# Builds the example-basic demo app and publishes it to GitHub Pages at
# https://nigelli.github.io/ngx-mermaid-canvas/ on every push to main.
#
# One-time setup by a maintainer: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". Until that's set, the deploy job will fail.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required by the Pages deployment: pages:write to publish, id-token:write for
# the deploy action's OIDC verification, contents:read to check out.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel superseded in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      # base-href must match the project-page subpath (/<repo-name>/) so the
      # SPA loads its assets correctly. The demo compiles the library from
      # source via the tsconfig path alias, so this always reflects latest main.
      - name: Build demo (production)
        run: npx ng build example-basic --base-href=/ngx-mermaid-canvas/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Application builder emits the servable site under browser/.
          path: dist/example-basic/browser

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
