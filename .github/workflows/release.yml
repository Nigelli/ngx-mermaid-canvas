name: Release

# Publishes the ngx-mermaid-canvas library to npm whenever a tag matching
# `v*` (e.g. v0.1.0, v1.2.3) is pushed.
on:
  push:
    tags:
      - 'v*'

# `id-token: write` is required for npm Trusted Publishing (OIDC): npm exchanges
# this short-lived GitHub OIDC token for publish auth, so no long-lived NPM_TOKEN
# is needed, and it also powers provenance/Sigstore attestation. `contents: read`
# is the minimal permission needed to check out the repo.
#
# Trusted Publishing is configured on the npm side (package -> Settings -> Trusted
# Publisher) and must match this repo AND this workflow's filename (release.yml).
permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22.x: current npm (>= 12) requires Node >= 22, and the
          # OIDC Trusted Publishing upgrade step below pulls npm@latest.
          node-version: 22.x
          cache: npm
          # Points the publish at the public npm registry (and writes the
          # .npmrc that the OIDC flow uses).
          registry-url: 'https://registry.npmjs.org'

      # Node 20/22 ship npm 10.x, which predates OIDC Trusted Publishing.
      # Upgrade to npm >= 11.5.1 so `npm publish` performs the OIDC exchange.
      - name: Upgrade npm (Trusted Publishing / OIDC support)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build library (production)
        run: npm run build:lib

      # Auth is via OIDC Trusted Publishing (no NODE_AUTH_TOKEN / NPM_TOKEN).
      # --provenance is generated automatically under Trusted Publishing, but is
      # kept explicit for clarity. --access public is harmless on the now-existing
      # public package and guards against a private default on future first
      # publishes of any new entry point.
      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public
        working-directory: dist/ngx-mermaid-editor
